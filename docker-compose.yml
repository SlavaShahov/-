services:
  web:
    build: .
    container_name: fight-club-web
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 8000
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: fight_club
      PG_USER: postgres
      PG_PASSWORD: postgres
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: fight_club
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_TTL_SECONDS: 120
      INTERNET_CHECK_HOST: example.com
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mongo
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: fight-club-postgres
    environment:
      POSTGRES_DB: fight_club
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql:ro
    ports:
      - "5438:5432"
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: fight-club-mongo
    environment:
      MONGO_INITDB_DATABASE: fight_club
    volumes:
      - mongo_data:/data/db
      - ./scripts/init_mongo.js:/docker-entrypoint-initdb.d/init_mongo.js:ro
    ports:
      - "27017:27017"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fight-club-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pg_data:
  mongo_data:
